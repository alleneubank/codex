# Fork-only release verification.
#
# The release artifacts are built on the fork owner's arm64 macOS host: macOS
# runs natively and Linux x64 runs under OrbStack's Rosetta-backed container
# runtime. GitHub Actions stays independent of artifact production and verifies
# the exact bundles after the prerelease is published.

name: rust-release

on:
  workflow_dispatch:
  push:
    branches:
      - fork
    paths:
      - ".github/docker/fork-release-linux.Dockerfile"
      - ".github/scripts/build-fork-release-target.sh"
      - ".github/scripts/fork-release.sh"
      - ".github/scripts/setup-rusty-v8.sh"
      - ".github/scripts/test-fork-release.sh"
      - ".github/scripts/verify-fork-release-bundle.sh"
      - ".github/workflows/rust-release.yml"
      - "codex-rs/fork-version.txt"
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  script-contract:
    name: Verify local publisher contract
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run release script contract
        run: bash .github/scripts/test-fork-release.sh
      - name: Check release shell scripts
        run: |
          shellcheck \
            .github/scripts/build-fork-release-target.sh \
            .github/scripts/fork-release.sh \
            .github/scripts/setup-rusty-v8.sh \
            .github/scripts/test-fork-release.sh \
            .github/scripts/verify-fork-release-bundle.sh

  release-metadata:
    name: Validate published release metadata
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      expected_version: ${{ steps.release.outputs.expected_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - name: Validate tag and version
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          base_version="$(tr -d '[:space:]' < codex-rs/fork-version.txt)"
          short_sha="$(git rev-parse --short=9 HEAD)"
          revision="$(git rev-parse --short=12 HEAD)"
          base_regex="${base_version//./\\.}"
          if [[ ! "${RELEASE_TAG}" =~ ^rust-v${base_regex}-fork\.[0-9]{8}\.g${short_sha}$ ]]; then
            echo "Tag ${RELEASE_TAG} does not match this commit and fork version" >&2
            exit 1
          fi
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "expected_version=codex-cli ${base_version}+fork.${revision}" >> "${GITHUB_OUTPUT}"

  verify-release-bundle:
    name: Verify ${{ matrix.name }} release bundle
    if: github.event_name == 'release'
    needs:
      - release-metadata
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - name: macOS arm64
            runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.release-metadata.outputs.release_tag }}
      - name: Download published bundle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "codex-${{ matrix.target }}-bundle.tar.zst" \
            --dir dist
      - name: Verify published bundle
        shell: bash
        run: |
          bash .github/scripts/verify-fork-release-bundle.sh \
            "${{ matrix.target }}" \
            "dist/codex-${{ matrix.target }}-bundle.tar.zst" \
            "${{ needs.release-metadata.outputs.expected_version }}"
