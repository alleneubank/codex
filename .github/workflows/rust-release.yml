# Fork-only Rust release workflow.
#
# `main` continues to mirror upstream plus the fork's product commits. This
# workflow is intentionally carried only by the `fork` branch so release
# plumbing never enters the upstream PR diff. A branch push builds the exact
# asset as a dry run; a matching tag push rebuilds the same asset for release.

name: rust-release

on:
  workflow_dispatch:
  push:
    branches:
      - fork
    tags:
      - "rust-v*-fork.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TARGET: x86_64-unknown-linux-musl

jobs:
  metadata:
    name: Resolve fork release metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate or preview release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(tr -d '[:space:]' < codex-rs/fork-version.txt)"
          short_sha="$(git rev-parse --short=9 HEAD)"
          base_regex="${base_version//./\\.}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            if [[ ! "${release_tag}" =~ ^rust-v${base_regex}-fork\.[0-9]{8}\.g${short_sha}$ ]]; then
              echo "Tag ${release_tag} does not match rust-v${base_version}-fork.<YYYYMMDD>.g${short_sha}" >&2
              exit 1
            fi
          else
            release_tag="rust-v${base_version}-fork.$(date -u +%Y%m%d).g${short_sha}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "Release tag: ${release_tag}"

  build-linux-x64:
    name: Build Linux x64 fork bundle
    needs: metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: codex-rs
    env:
      AWS_LC_SYS_NO_JITTER_ENTROPY: "1"
      AWS_LC_SYS_NO_JITTER_ENTROPY_x86_64_unknown_linux_musl: "1"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ env.RELEASE_TARGET }}

      - name: Use hermetic Cargo home
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "${GITHUB_ENV}"
          echo "${cargo_home}/bin" >> "${GITHUB_PATH}"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install musl build tools
        env:
          TARGET: ${{ env.RELEASE_TARGET }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rusty_v8 artifact overrides
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: ${{ env.RELEASE_TARGET }}

      - name: Build bwrap and export digest
        shell: bash
        run: |
          set -euo pipefail
          target="${RELEASE_TARGET}"
          cargo build --target "${target}" --release --timings --bin bwrap

          bwrap_path="target/${target}/release/bwrap"
          strip --strip-debug --strip-unneeded "${bwrap_path}"
          digest="$(sha256sum "${bwrap_path}" | awk '{print $1}')"
          echo "CODEX_BWRAP_SHA256=${digest}" >> "${GITHUB_ENV}"
          echo "Built bwrap with sha256:${digest}"

      - name: Build Codex and code-mode host
        shell: bash
        run: |
          set -euo pipefail
          cargo build \
            --target "${RELEASE_TARGET}" \
            --release \
            --timings \
            --bin codex \
            --bin codex-code-mode-host

      - name: Strip binaries and archive symbols
        shell: bash
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/.github/scripts/archive-release-symbols-and-strip-binaries.sh" \
            --target "${RELEASE_TARGET}" \
            --artifact-name "${RELEASE_TARGET}" \
            --release-dir "target/${RELEASE_TARGET}/release" \
            --archive-dir "symbols-dist/${RELEASE_TARGET}" \
            --binaries "codex codex-code-mode-host"

      - name: Stage bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="${RUNNER_TEMP}/codex-${RELEASE_TARGET}-bundle"
          bundle_path="dist/codex-${RELEASE_TARGET}-bundle.tar.zst"

          rm -rf "${bundle_root}"
          mkdir -p "${bundle_root}/codex-resources" dist
          cp "target/${RELEASE_TARGET}/release/codex" "${bundle_root}/codex"
          cp "target/${RELEASE_TARGET}/release/codex-code-mode-host" "${bundle_root}/codex-code-mode-host"
          cp "target/${RELEASE_TARGET}/release/bwrap" "${bundle_root}/codex-resources/bwrap"
          chmod 0755 \
            "${bundle_root}/codex" \
            "${bundle_root}/codex-code-mode-host" \
            "${bundle_root}/codex-resources/bwrap"

          tar -C "${bundle_root}" -cf - codex codex-code-mode-host codex-resources/bwrap |
            zstd -T0 -19 -o "${bundle_path}"
          sha256sum "${bundle_path}"

      - name: Verify staged bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail
          bundle="dist/codex-${RELEASE_TARGET}-bundle.tar.zst"
          verify_root="${RUNNER_TEMP}/verify-bundle"

          rm -rf "${verify_root}"
          mkdir -p "${verify_root}"
          tar --use-compress-program=unzstd -xf "${bundle}" -C "${verify_root}"

          test -x "${verify_root}/codex"
          test -x "${verify_root}/codex-code-mode-host"
          test -x "${verify_root}/codex-resources/bwrap"
          "${verify_root}/codex" --version
          echo "Bundle verified for ${RELEASE_TAG}"

      - name: Upload fork release bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-${{ env.RELEASE_TARGET }}-bundle
          path: codex-rs/dist/codex-${{ env.RELEASE_TARGET }}-bundle.tar.zst
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
